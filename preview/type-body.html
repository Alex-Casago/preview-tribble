<!doctype html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-bg-background);}
  .wrap{padding:28px 40px; display:flex; flex-direction:column; gap:18px;}
  .row{display:flex; align-items:baseline; gap:20px;}
  .spec{font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--brand-text-secondary); width:180px; flex:none;}
  .title{font-size:28px; font-weight:400; letter-spacing:-0.01em; color:#353B43;}
  .bodyl{font-size:18px; font-weight:400; letter-spacing:0.02em; color:#353B43;}
  .body{font-size:16px; font-weight:400; letter-spacing:0.02em; color:#353B43;}
  .cap{font-size:14px; font-weight:400; letter-spacing:0.02em; color:#868C95;}
  .claim{font-size:14px; font-weight:400; letter-spacing:0.06em; text-transform:uppercase; color:#353B43;}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="spec">Title · 28 · 400</div><div class="title">Grundstücksankauf</div></div>
  <div class="row"><div class="spec">Body L · 18 · 400</div><div class="bodyl">Präzise Planung. Klare Umsetzung.</div></div>
  <div class="row"><div class="spec">Body · 16 · 400</div><div class="body">Das Team übernimmt Verantwortung.</div></div>
  <div class="row"><div class="spec">Caption · 14 · 400</div><div class="cap">Den ganzen Bericht lesen</div></div>
  <div class="row"><div class="spec">Claim · 14 · uppercase</div><div class="claim">Planen. Umsetzen. Leben.</div></div>
</div>
</body></html>
