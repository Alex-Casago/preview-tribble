<!doctype html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-bg-background);}
  .wrap{padding:24px 32px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th,td{text-align:left; padding:10px 12px; border-bottom:1px solid var(--brand-ui-border);}
  th{font-weight:500; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--brand-text-secondary);}
  .pair{display:inline-flex; gap:2px; align-items:center; padding:4px 10px; border-radius:4px; font-variant-numeric:tabular-nums; letter-spacing:0.01em;}
  .ratio{font-variant-numeric:tabular-nums;}
  .level{font-size:11px; padding:2px 8px; border-radius:3px; background:#003B44; color:#59EDED; letter-spacing:0.06em; font-weight:500;}
</style>
</head><body>
<div class="wrap">
<table>
<thead><tr><th>Pair</th><th>Ratio</th><th>Level</th><th>Usage</th></tr></thead>
<tbody>
<tr><td><span class="pair" style="background:#F8F8F7; color:#353B43">#353B43 / #F8F8F7</span></td><td class="ratio">10.6:1</td><td><span class="level">AAA</span></td><td>Body copy</td></tr>
<tr><td><span class="pair" style="background:#20252B; color:#F8F8F7">#F8F8F7 / #20252B</span></td><td class="ratio">14.5:1</td><td><span class="level">AAA</span></td><td>Navigation, Footer</td></tr>
<tr><td><span class="pair" style="background:#050C11; color:#59EDED">#59EDED / #050C11</span></td><td class="ratio">13.8:1</td><td><span class="level">AAA</span></td><td>Kennzahlen</td></tr>
<tr><td><span class="pair" style="background:#050C11; color:#F8F8F7">#F8F8F7 / #050C11</span></td><td class="ratio">18.5:1</td><td><span class="level">AAA</span></td><td>Hero on photo</td></tr>
<tr><td><span class="pair" style="background:#F8F8F7; color:#868C95">#868C95 / #F8F8F7</span></td><td class="ratio">3.2:1</td><td><span class="level" style="background:#353B43; color:#F8F8F7">AA+</span></td><td>Captions</td></tr>
</tbody>
</table>
</div>
</body></html>
