<!doctype html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-bg-background);}
  .wrap{padding:28px 40px; display:flex; flex-direction:column; gap:22px;}
  .row{display:flex; align-items:baseline; gap:20px;}
  .spec{font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--brand-text-secondary); width:160px; flex:none;}
  .h1{font-size:40px; font-weight:400; letter-spacing:-0.005em; line-height:1.1; color:#353B43;}
  .h2{font-size:34px; font-weight:500; line-height:1.15; color:#353B43;}
  .h3{font-size:32px; font-weight:500; line-height:1.2; color:#353B43;}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="spec">Heading L · 40 · 400</div><div class="h1">Wir bauen. Wir begrünen.</div></div>
  <div class="row"><div class="spec">Heading M · 34 · 500</div><div class="h2">Wir denken weiter.</div></div>
  <div class="row"><div class="spec">Heading S · 32 · 500</div><div class="h3">Dachbegrünung & Stadtplanung</div></div>
</div>
</body></html>
