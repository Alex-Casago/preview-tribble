<!doctype html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-bg-background);}
  .wrap{padding:32px; display:flex; gap:16px; flex-wrap:wrap; align-items:center;}
  .btn{font-family:inherit; font-size:16px; font-weight:500; letter-spacing:0.02em; padding:14px 24px; border-radius:4px; border:1px solid transparent; cursor:pointer; line-height:1;}
  .btn-primary{background:#FFF; color:#141414; border-color:#E5E5E5;}
  .btn-dark{background:#20252B; color:#F8F8F7;}
  .btn-outline{background:transparent; color:#353B43; border-color:#353B43;}
  .btn-disabled{background:#CAC7C6; color:#FFFFFF; cursor:not-allowed;}
</style></head><body>
<div class="wrap">
  <button class="btn btn-dark">Projekt anfragen</button>
  <button class="btn btn-outline">Mehr erfahren</button>
  <button class="btn btn-primary">Kontakt</button>
  <button class="btn btn-disabled" disabled>Gesendet</button>
</div>
</body></html>
