<!doctype html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-bg-background);}
  .wrap{padding:32px 40px;}
  .weights{display:flex; gap:40px; align-items:baseline;}
  .w{display:flex; flex-direction:column; gap:8px;}
  .glyph{font-size:72px; letter-spacing:-0.01em; line-height:0.9; color:#353B43;}
  .lbl{font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--brand-text-secondary);}
  .r400{font-weight:400;}
  .r500{font-weight:500;}
  .note{margin-top:22px; padding-top:18px; border-top:1px solid var(--brand-ui-border); font-size:13px; color:var(--brand-text-secondary); max-width:560px;}
</style></head><body>
<div class="wrap">
  <div class="weights">
    <div class="w"><div class="glyph r400">Aa</div><div class="lbl">Regular · 400</div></div>
    <div class="w"><div class="glyph r500">Aa</div><div class="lbl">Medium · 500</div></div>
    <div class="w"><div class="glyph" style="color:#CDCDCD; text-decoration:line-through">Bb</div><div class="lbl" style="color:#CDCDCD">No Bold</div></div>
    <div class="w"><div class="glyph" style="color:#CDCDCD; text-decoration:line-through">Ll</div><div class="lbl" style="color:#CDCDCD">No Light</div></div>
  </div>
  <div class="note">„Die Ruhe der Marke entsteht durch diesen bewussten Verzicht." — Nur zwei Gewichte. Kein Bold, kein SemiBold, kein Light.</div>
</div>
</body></html>
