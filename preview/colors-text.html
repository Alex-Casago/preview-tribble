<!doctype html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-bg-background);}
  .wrap{padding:28px 32px;}
  .row{display:grid; grid-template-columns:repeat(5,1fr); gap:12px;}
  .card{background:var(--brand-bg-surface); border:1px solid var(--brand-ui-border); border-radius:8px; padding:16px;}
  .sample{font-size:24px; letter-spacing:-0.01em; margin-bottom:12px; line-height:1;}
  .name{font-size:12px; color:var(--brand-text-primary); font-weight:500;}
  .hex{font-size:11px; color:var(--brand-text-secondary); text-transform:uppercase; letter-spacing:0.04em; font-variant-numeric:tabular-nums;}
  .dark{background:#20252B;}
  .dark .name{color:#F8F8F7;} .dark .hex{color:#BFC3CA;}
</style>
</head><body>
<div class="wrap">
  <div class="row">
    <div class="card"><div class="sample" style="color:#353B43">Aa</div><div class="name">Primary</div><div class="hex">#353B43</div></div>
    <div class="card"><div class="sample" style="color:#868C95">Aa</div><div class="name">Secondary</div><div class="hex">#868C95</div></div>
    <div class="card"><div class="sample" style="color:#CDCDCD">Aa</div><div class="name">Muted</div><div class="hex">#CDCDCD</div></div>
    <div class="card dark"><div class="sample" style="color:#F8F8F7">Aa</div><div class="name">On Dark</div><div class="hex">#F8F8F7</div></div>
    <div class="card dark"><div class="sample" style="color:#BFC3CA">Aa</div><div class="name">On Dark Muted</div><div class="hex">#BFC3CA</div></div>
  </div>
</div>
</body></html>
