<!doctype html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-bg-background);}
  .wrap{padding:24px 32px;}
  .row{display:flex; align-items:center; gap:14px; padding:8px 0;}
  .box{background:var(--brand-dark-petrol); height:24px; border-radius:3px;}
  .name{font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--brand-text-secondary); width:70px; flex:none;}
  .val{font-size:12px; color:var(--brand-text-primary); font-variant-numeric:tabular-nums; letter-spacing:0.02em; width:56px; flex:none;}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="name">1</div><div class="box" style="width:4px"></div><div class="val">4 px</div></div>
  <div class="row"><div class="name">2</div><div class="box" style="width:8px"></div><div class="val">8 px</div></div>
  <div class="row"><div class="name">3</div><div class="box" style="width:12px"></div><div class="val">12 px</div></div>
  <div class="row"><div class="name">4</div><div class="box" style="width:16px"></div><div class="val">16 px</div></div>
  <div class="row"><div class="name">5</div><div class="box" style="width:24px"></div><div class="val">24 px</div></div>
  <div class="row"><div class="name">6</div><div class="box" style="width:32px"></div><div class="val">32 px</div></div>
  <div class="row"><div class="name">7</div><div class="box" style="width:48px"></div><div class="val">48 px</div></div>
  <div class="row"><div class="name">8</div><div class="box" style="width:64px"></div><div class="val">64 px</div></div>
  <div class="row"><div class="name">9</div><div class="box" style="width:96px"></div><div class="val">96 px</div></div>
</div>
</body></html>
