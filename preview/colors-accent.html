<!doctype html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-bg-background);}
  .wrap{padding:24px 28px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
  .card{border-radius:8px; overflow:hidden; border:1px solid var(--brand-ui-border);}
  .bar{height:92px; display:flex; align-items:flex-end; padding:14px;}
  .stat{font-size:28px; letter-spacing:-0.01em; line-height:1;}
  .meta{background:var(--brand-bg-surface); padding:10px 14px; display:flex; justify-content:space-between; align-items:center;}
  .name{font-size:13px; font-weight:500;}
  .hex{font-size:11px; color:var(--brand-text-secondary); text-transform:uppercase; letter-spacing:0.04em; font-variant-numeric:tabular-nums;}
  .role{font-size:10px; letter-spacing:0.08em; text-transform:uppercase; opacity:0.75; margin-top:6px;}
</style>
</head><body>
<div class="wrap">
  <div class="card">
    <div class="bar" style="background:#050C11"><div><div class="stat" style="color:#59EDED">+24%</div><div class="role" style="color:#59EDED">Highlight · Kennzahl</div></div></div>
    <div class="meta"><div class="name">Cyan</div><div class="hex">#59EDED</div></div>
  </div>
  <div class="card">
    <div class="bar" style="background:#005F6A"><div><div class="stat" style="color:#F8F8F7">360°</div><div class="role" style="color:#DAE9EC">Primary Petrol</div></div></div>
    <div class="meta"><div class="name">Petrol</div><div class="hex">#005F6A</div></div>
  </div>
  <div class="card">
    <div class="bar" style="background:#1A8B9A"><div><div class="stat" style="color:#F8F8F7">↗</div><div class="role" style="color:#EEF5F6">Claim · Hover</div></div></div>
    <div class="meta"><div class="name">Accent Petrol</div><div class="hex">#1A8B9A</div></div>
  </div>
  <div class="card">
    <div class="bar" style="background:#003B44"><div><div class="stat" style="color:#59EDED">27</div><div class="role" style="color:#DAE9EC">Stat Card BG</div></div></div>
    <div class="meta"><div class="name">Dark Petrol</div><div class="hex">#003B44</div></div>
  </div>
  <div class="card">
    <div class="bar" style="background:#DAE9EC"><div><div class="stat" style="color:#003B44">Info</div><div class="role" style="color:#005F6A">Info · Highlight Box</div></div></div>
    <div class="meta"><div class="name">Light BG Petrol</div><div class="hex">#DAE9EC</div></div>
  </div>
  <div class="card">
    <div class="bar" style="background:#EEF5F6"><div><div class="stat" style="color:#005F6A">§</div><div class="role" style="color:#1A8B9A">Seiten-BG · Akzent</div></div></div>
    <div class="meta"><div class="name">Content BG Petrol</div><div class="hex">#EEF5F6</div></div>
  </div>
</div>
</body></html>
