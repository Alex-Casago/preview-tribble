<!doctype html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-bg-background);}
  .wrap{padding:28px 32px; display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  /* Dark-Petrol grundiert die Stat-Fläche (README), Cyan für Kennzahlen */
  .stat{background:#003B44; border-radius:8px; padding:24px; color:#FFFFFF;}
  .num{font-size:48px; line-height:1; font-weight:400; letter-spacing:-0.01em; color:#59EDED; margin-bottom:10px;}
  .lbl{font-size:13px; letter-spacing:0.02em; color:#DAE9EC;}
  .claim{font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#59EDED; margin-bottom:10px;}
</style></head><body>
<div class="wrap">
  <div class="stat"><div class="claim">Seit 1998</div><div class="num">27</div><div class="lbl">Jahre Erfahrung im Bau</div></div>
  <div class="stat"><div class="claim">360°</div><div class="num">142</div><div class="lbl">Projekte aus einer Hand</div></div>
</div>
</body></html>
