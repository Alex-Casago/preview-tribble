<!doctype html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-bg-background);}
  .wrap{padding:28px 32px;}
  /* Werte aus shared.css .teaser — Foto trägt die Karte, Petrol-Kicker, warme Graustufen */
  .card{background:#FFF; border:1px solid #D5D3CE; border-radius:8px; overflow:hidden; display:grid; grid-template-columns:200px 1fr;}
  .thumb{position:relative; min-height:170px; background:#EEF5F6; overflow:hidden;}
  .thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .body{padding:24px 26px;}
  .cat{font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#005F6A; margin-bottom:12px;}
  .title{font-size:22px; font-weight:400; letter-spacing:-0.005em; line-height:1.2; color:#1A1A1A; margin-bottom:10px;}
  .desc{font-size:14.5px; color:#555; letter-spacing:0.015em; line-height:1.6; margin-bottom:16px;}
  .more{font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#005F6A; display:inline-flex; gap:10px; align-items:center;}
  .more::after{content:"→";}
</style></head><body>
<div class="wrap">
  <div class="card">
    <div class="thumb"><img src="../assets/images/project-green-roofs-aerial.webp" alt=""></div>
    <div class="body">
      <div class="cat">Referenzen · Wohnbau</div>
      <div class="title">Wohnquartier am Stadtpark</div>
      <div class="desc">42 Wohneinheiten mit Dachbegrünung und Schwammstadt-Konzept — realisiert in 18 Monaten.</div>
      <span class="more">Den ganzen Bericht lesen</span>
    </div>
  </div>
</div>
</body></html>
