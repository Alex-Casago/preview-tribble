<!doctype html>
<html lang="de"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--brand-bg-background);}
  .wrap{padding:8px 0;}

  /* 1 — Signatur-Zitat: zentriertes, kursives Band (siehe index.html .quote-band) */
  .band{background:#FAFAF8; padding:44px 48px; border-top:1px solid #D5D3CE; border-bottom:1px solid #D5D3CE;}
  .band blockquote{font-size:30px; font-weight:400; letter-spacing:-0.01em; line-height:1.25; color:#1A1A1A; max-width:760px; margin:0 auto; text-align:center; font-style:italic;}
  .band blockquote em{color:#003B44; font-style:italic;}
  .author{margin-top:28px; text-align:center; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:#666;}
  .author b{color:#1A1A1A; font-weight:500;}

  /* 2 — Pullquote: randloser Linksakzent in Accent-Petrol (siehe shared.css .pullquote) */
  .pull-area{padding:40px 48px;}
  .pullquote{font-size:26px; font-weight:400; letter-spacing:-0.01em; line-height:1.25; color:#003B44; max-width:760px; border-left:3px solid #1A8B9A; padding:8px 0 8px 28px; margin:0;}
</style></head><body>
<div class="wrap">
  <div class="band">
    <blockquote>„Wir betrachten Projekte nicht nur in einer Dimension. <em>Sondern ganzheitlich.</em>"</blockquote>
    <div class="author"><b>Fred Fröhlich</b> · Geschäftsführer</div>
  </div>
  <div class="pull-area">
    <p class="pullquote">„Wir unterscheiden nicht nach ‚unseren' und ‚Ihren' Projekten."</p>
  </div>
</div>
</body></html>
